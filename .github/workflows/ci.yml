name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Pipelines (lint, test, doctor, docs, yml)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Run pipelines
        run: |
          set -e
          chmod +x pipelines/*.sh
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          ./pipelines/ci.sh
